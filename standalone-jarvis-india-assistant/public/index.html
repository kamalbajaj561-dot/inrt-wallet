<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS India Assistant</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>🧠 JARVIS India Assistant</h1>
        <p>Voice assistant + Indian stock market knowledge + live quote fetch</p>
      </header>

      <section class="card">
        <div id="chat" class="chat"></div>
        <div class="controls">
          <input id="messageInput" placeholder="Ask about NIFTY, options, tax, risk, or type: quote RELIANCE" />
          <button id="micBtn" title="Voice input">🎤</button>
          <button id="sendBtn">Send</button>
        </div>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
